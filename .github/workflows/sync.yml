name: Sync sports data

# Manual only. Scheduled sync already runs via Vercel Cron (`vercel.json`)
# and on page load (`ensureFreshEvents`). Keeping a GitHub schedule without
# SITE_URL / CRON_SECRET secrets floods failure emails.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected sync endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET secrets. Configure them in repo Settings → Secrets before running this workflow."
            exit 1
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/admin/sync"
