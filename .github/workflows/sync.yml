name: Sync sports data

# Requires secret CRON_SECRET (same value as Vercel). SITE_URL is fixed to production.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected sync endpoint
        env:
          SITE_URL: https://dondejuega.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET. Add it under Settings → Secrets and variables → Actions (same value as Vercel)."
            exit 1
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/admin/sync"
